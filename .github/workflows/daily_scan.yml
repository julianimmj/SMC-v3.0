name: Daily SMC Screener Scan

on:
  schedule:
    - cron: '0 3 * * *' # 03:00 UTC (00:00 BRT timezone aprox, dep de horário de verão). Mude pra '0 6 * * *' se quiser 03:00 BRT
  workflow_dispatch: # Permite rodar manualmente pelo Github

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas yfinance numpy PyGithub

    - name: Run SMC Job
      env:
        SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
        SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      run: |
        python daily_job.py

    - name: Commit Latest Scan
      run: |
        git config --global user.name 'SMC Bot'
        git config --global user.email 'bot@smcscreener.com'
        git add latest_scan.csv
        # Commit only if there are changes
        git commit -m "bot: upload resultados diarios [skip ci]" || echo "No changes to commit"
        git push
